name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: songshare_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpassword"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15

    env:
      DATABASE_URL: mysql://root:rootpassword@127.0.0.1:3306/songshare_test
      BETTER_AUTH_SECRET: ci-test-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      # Lock CORS/trustedOrigins to the host the Playwright suite presents as Origin.
      CORS_ORIGIN: http://localhost:3000
      UPLOAD_DIR: ./uploads
      MAX_UPLOAD_BYTES: 26214400

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm run test

      # End-to-end: boot the compiled app (Playwright's webServer) against the MySQL
      # service and drive the real auth + business flow across every endpoint.
      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: API tests (Playwright)
        run: npm run test:api

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
