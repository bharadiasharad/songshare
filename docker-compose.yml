services:
  mysql:
    image: mysql:8.0
    container_name: songshare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-songshare}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-p${MYSQL_ROOT_PASSWORD:-rootpassword}']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: songshare-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override host so the app reaches the mysql service inside the compose network
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/${MYSQL_DATABASE:-songshare}
      UPLOAD_DIR: /app/uploads
      # App always listens on 3000 inside the container; HOST_PORT controls the
      # published port so it can be remapped if 3000 is taken on the host.
      PORT: 3000
    ports:
      - '${HOST_PORT:-3000}:3000'
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  db_data:
  uploads:
